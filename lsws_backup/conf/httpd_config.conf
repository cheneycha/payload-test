#
# OpenLiteSpeed Main Configuration File
#

extuser {
}

serverName              localhost
user                    lsadm
group                   lsadm
priority                0
autoRestart             1
inMemBufSize            60M
swappingDir             /tmp/lshttpd/swap
autoFix503              1
gracefulRestartTimeout  300
mime                    conf/mime.properties
showVersionNumber       0
adminEmails             root@localhost
indexFiles              index.html

errorlog logs/error.log {
  logLevel                INFO
  debugLevel              0
  rollingSize             10M
}

tuning {
  maxConnections          10000
  maxSSLConnections       10000
  connTimeout             300
  maxKeepAliveReq         1000
  keepAliveTimeout        5
  sndBufSize              0
  rcvBufSize              0
  gzipProcessor           1
  enableGzipCompress      1
  compressibleTypes       text/*,application/x-javascript,application/javascript,application/xml,image/svg+xml
  enableDynGzipCompress   1
  gzipCompressLevel       6
  gzipAutoUpdateStatic    1
  gzipStaticCompressLevel 6
  gzipMaxFileSize         10M
  gzipMinFileSize         300
}

# ---------------------------------------------------------
# Virtual Host Definitions
# ---------------------------------------------------------
virtualHost payload {
  vhRoot                  conf/vhosts/payload/
  configFile              conf/vhosts/payload/vhconf.conf
  allowSymbolLink         1
  enableScript            1
  restrained              0
}

# ---------------------------------------------------------
# Listeners
# ---------------------------------------------------------

# HTTP Port 80 Listener (Active for Certbot & Redirects)
listener DefaultHTTP {
  address                 *:80
  secure                  0
  map                     payload localhost, *
}

# HTTPS Port 443 Listener
# NOTE: Leave this block completely commented out until your Certbot container 
# successfully generates the certificates inside the bound directory.
# Once certificates exist, replace "yourdomain.com" with your real domain and uncomment.
#
listener DefaultHTTPS {
  address                 *:443
  secure                  1
  keyFile                 /etc/letsencrypt/live/payload.presspizza.com/privkey.pem
  certFile                /etc/letsencrypt/live/payload.presspizza.com/fullchain.pem
  map                     payload payload.presspizza.com, localhost
}
